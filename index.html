<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐿️ 다람쥐 메모리 카드 게임</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #FFF8F0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  h1 {
    font-size: 1.8rem;
    color: #D2691E;
    margin-bottom: 6px;
    text-align: center;
  }
  .subtitle {
    font-size: 0.9rem;
    color: #C8875A;
    margin-bottom: 16px;
  }
  .stats-bar {
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 14px;
    font-size: 1rem;
    color: #8B5E3C;
  }
  .stats-bar span { display: flex; align-items: center; gap: 4px; }
  .best-record {
    font-size: 0.85rem;
    color: #C8875A;
    margin-bottom: 14px;
    min-height: 1.2em;
  }
  .btn {
    background: #E8832A;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 24px;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn:hover { background: #D0731E; }
  .btn-small {
    background: transparent;
    border: 2px solid #E8832A;
    color: #E8832A;
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .btn-small:hover { background: #FFF0E0; }
  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 16px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    max-width: 400px;
    width: 100%;
  }
  .card {
    aspect-ratio: 1;
    perspective: 600px;
    cursor: pointer;
  }
  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transition: transform 0.5s;
    transform-style: preserve-3d;
  }
  .card.flipped .card-inner { transform: rotateY(180deg); }
  .card.matched .card-inner { transform: rotateY(180deg); }
  .card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
  }
  .card-front {
    background: linear-gradient(135deg, #E8832A, #F4A54A);
    color: #fff;
    box-shadow: 0 4px 12px rgba(232,131,42,0.3);
  }
  .card-front::after {
    content: '🌰';
    font-size: 2rem;
    opacity: 0.6;
  }
  .card-back {
    background: #FFF3E6;
    transform: rotateY(180deg);
    border: 3px solid #F4A54A;
    box-shadow: 0 4px 12px rgba(232,131,42,0.15);
  }
  .card.matched .card-back {
    background: #FFF8DC;
    border-color: #DAA520;
    animation: matchPop 0.4s ease;
  }
  @keyframes matchPop {
    0% { transform: rotateY(180deg) scale(1); }
    50% { transform: rotateY(180deg) scale(1.1); }
    100% { transform: rotateY(180deg) scale(1); }
  }
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .overlay.show { display: flex; }
  .modal {
    background: #FFF8F0;
    border-radius: 20px;
    padding: 36px;
    text-align: center;
    max-width: 340px;
    width: 90%;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  }
  .modal h2 { color: #D2691E; margin-bottom: 10px; font-size: 1.5rem; }
  .modal p { color: #8B5E3C; margin-bottom: 6px; }
  .modal .trophy { font-size: 3rem; margin-bottom: 10px; }
  .modal .btn { margin-top: 16px; }
  @media (max-width: 440px) {
    .grid { gap: 8px; max-width: 92vw; }
    .card-front::after { font-size: 1.5rem; }
    .card-back { font-size: 2rem; }
    h1 { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<h1>🐿️ 다람쥐 메모리 카드</h1>
<p class="subtitle">가을 숲속 짝 맞추기</p>

<div class="stats-bar">
  <span>⏱️ <span id="timer">00:00</span></span>
  <span>🔄 시도 <span id="moves">0</span>회</span>
  <span>🃏 <span id="pairs">0</span>/8 쌍</span>
</div>
<div class="best-record" id="bestRecord"></div>

<div class="controls">
  <button class="btn" id="restartBtn" onclick="initGame()">🔄 새 게임</button>
  <button class="btn-small" id="muteBtn" onclick="toggleMute()">🔊 소리</button>
</div>

<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="trophy" id="trophyIcon">🎉</div>
    <h2 id="modalTitle">축하합니다!</h2>
    <p id="modalTime"></p>
    <p id="modalMoves"></p>
    <p id="modalRecord" style="font-weight:bold;color:#DAA520;"></p>
    <button class="btn" onclick="closeModal(); initGame();">🔄 다시 하기</button>
  </div>
</div>

<script>
const EMOJIS = ['🌰','🐿️','🍁','🍂','🌳','🍄','🎃','🌾'];
let cards = [], flipped = [], matched = 0, moves = 0, locked = false;
let timerInterval, seconds = 0, gameStarted = false, muted = false;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function beep(freq, dur, type='sine', vol=0.15) {
  if (muted) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.value = vol;
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.stop(audioCtx.currentTime + dur);
}
function sndFlip() { beep(500, 0.1, 'sine', 0.12); }
function sndMatch() { beep(660, 0.12); setTimeout(()=>beep(880, 0.2), 120); }
function sndFail() { beep(300, 0.15, 'triangle', 0.1); setTimeout(()=>beep(250, 0.2, 'triangle', 0.1), 130); }
function sndWin() {
  [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.25,'sine',0.18), i*150));
}

function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function formatTime(s) { return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }

function startTimer() {
  if(gameStarted) return;
  gameStarted = true;
  timerInterval = setInterval(()=>{ seconds++; document.getElementById('timer').textContent = formatTime(seconds); }, 1000);
}

function stopTimer() { clearInterval(timerInterval); }

function getBest() {
  try { return JSON.parse(localStorage.getItem('squirrelMemoryBest')); } catch { return null; }
}
function saveBest(time, moves) {
  localStorage.setItem('squirrelMemoryBest', JSON.stringify({time, moves}));
}
function showBest() {
  const b = getBest();
  document.getElementById('bestRecord').textContent = b ? `🏆 최고 기록: ${formatTime(b.time)} / ${b.moves}회` : '';
}

function initGame() {
  stopTimer();
  matched = 0; moves = 0; seconds = 0; flipped = []; locked = false; gameStarted = false;
  document.getElementById('timer').textContent = '00:00';
  document.getElementById('moves').textContent = '0';
  document.getElementById('pairs').textContent = '0';
  showBest();
  const deck = shuffle([...EMOJIS, ...EMOJIS]);
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  cards = deck.map((emoji, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="card-inner"><div class="card-front"></div><div class="card-back">${emoji}</div></div>`;
    card.dataset.emoji = emoji;
    card.dataset.index = i;
    card.addEventListener('click', () => flipCard(card));
    grid.appendChild(card);
    return card;
  });
}

function flipCard(card) {
  if(locked || card.classList.contains('flipped') || card.classList.contains('matched')) return;
  startTimer();
  card.classList.add('flipped');
  sndFlip();
  flipped.push(card);
  if(flipped.length === 2) {
    moves++;
    document.getElementById('moves').textContent = moves;
    locked = true;
    if(flipped[0].dataset.emoji === flipped[1].dataset.emoji) {
      setTimeout(()=>{
        flipped.forEach(c => c.classList.add('matched'));
        sndMatch();
        matched++;
        document.getElementById('pairs').textContent = matched;
        flipped = []; locked = false;
        if(matched === 8) gameComplete();
      }, 400);
    } else {
      setTimeout(()=>{
        sndFail();
        flipped.forEach(c => c.classList.remove('flipped'));
        flipped = []; locked = false;
      }, 800);
    }
  }
}

function gameComplete() {
  stopTimer();
  sndWin();
  const best = getBest();
  const isRecord = !best || seconds < best.time || (seconds === best.time && moves < best.moves);
  if(isRecord) saveBest(seconds, moves);
  showBest();
  document.getElementById('trophyIcon').textContent = isRecord ? '🏆' : '🎉';
  document.getElementById('modalTitle').textContent = isRecord ? '🏆 신기록!' : '축하합니다!';
  document.getElementById('modalTime').textContent = `⏱️ 시간: ${formatTime(seconds)}`;
  document.getElementById('modalMoves').textContent = `🔄 시도: ${moves}회`;
  document.getElementById('modalRecord').textContent = isRecord ? '새로운 최고 기록을 세웠어요!' : '';
  document.getElementById('overlay').classList.add('show');
}

function closeModal() { document.getElementById('overlay').classList.remove('show'); }
function toggleMute() {
  muted = !muted;
  document.getElementById('muteBtn').textContent = muted ? '🔇 음소거' : '🔊 소리';
}

initGame();
</script>
</body>
</html>
